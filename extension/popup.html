<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 260px; margin: 0; font: 13px system-ui, sans-serif; color: #0f172a; }
      .wrap { padding: 14px; }
      h1 { font-size: 14px; margin: 0 0 6px; }
      h1 span { color: #16a34a; }
      p { margin: 6px 0; color: #475569; }
      .item { margin-top: 8px; padding: 8px; background: #f1f5f9; border-radius: 10px; }
      .item b { display: block; }
      .muted { color: #94a3b8; font-size: 12px; }
      a { color: #16a34a; font-weight: 600; text-decoration: none; }
      button { margin-top: 8px; width: 100%; padding: 8px; border: 0; border-radius: 9999px; background: #e2e8f0; color: #334155; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Trail<span>Flip</span> Lister</h1>
      <div id="content"><p class="muted">Loading…</p></div>
      <a href="https://www.facebook.com/marketplace/create/item" target="_blank">Open Facebook Marketplace ↗</a>
      <button id="clear">Clear stored listing</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
